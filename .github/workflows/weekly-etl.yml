name: weekly-etl

# INCREMENTAL-ONLY. This scheduled cron runs ONLY the incremental updater
# (scripts/run_weekly_etl.sh -> billboard_stats.etl.updater). It MUST NEVER
# invoke the multi-decade backfill module or its operator runner:
#   - the backfill guardrail aborts when GITHUB_EVENT_NAME == "schedule" (belt), and
#   - this workflow references ONLY the weekly updater path (suspenders).
# The multi-decade scrape is operator-run and lives in the separate
# manual-dispatch workflow. Do not add any backfill step here.
"on":
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  weekly-etl:
    runs-on: ubuntu-latest
    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGSSLMODE: ${{ secrets.PGSSLMODE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly ETL
        run: bash scripts/run_weekly_etl.sh
